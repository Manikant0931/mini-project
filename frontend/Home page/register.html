<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>


<body class="auth-page">
    

<div class="form-container">

<h2>Create Account</h2>

<form id = "registerForm">

<input type="text" placeholder="Enter Name" required>

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<input type="number" placeholder="Enter Age" required>

<input type="number" placeholder="Enter Height (cm)" required>

<input type="number" placeholder="Enter Weight (kg)" required>

<button type="submit">Register</button>

</form>

<p>Already have account? <a href="login.html">Login</a></p>

</div>
<script src="../config.js"></script>
<script src="script.js"></script>


</body>
</html>
